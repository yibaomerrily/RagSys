<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>情绪关怀小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* iPhone手机壳 */
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #1a1a1a;
            border-radius: 48px;
            padding: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        /* 顶部听筒区域 */
        .phone-notch {
            width: 160px;
            height: 30px;
            background-color: #1a1a1a;
            border-radius: 0 0 20px 20px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* 屏幕区域 */
        .screen {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px;
            padding-top: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 32px;
            padding-right: 32px;
            font-size: 14px;
            font-weight: 600;
            color: #000;
        }

        /* 主内容区域 */
        .content {
            padding: 24px;
            padding-top: 0;
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            padding: 40px 0 32px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(82, 196, 26, 0.3);
        }

        .logo-icon {
            font-size: 48px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .app-subtitle {
            font-size: 13px;
            color: #999;
        }

        /* 功能特点卡片 */
        .features-section {
            margin-bottom: 32px;
        }

        .feature-card {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #f0f0f0;
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .feature-icon.blue {
            background-color: #e6f7ff;
            color: #1890ff;
        }

        .feature-icon.pink {
            background-color: #fff0f6;
            color: #eb2f96;
        }

        .feature-icon.green {
            background-color: #f6ffed;
            color: #52c41a;
        }

        .feature-content {
            flex: 1;
        }

        .feature-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 3px;
        }

        .feature-desc {
            font-size: 12px;
            color: #999;
            line-height: 1.4;
        }

        /* 授权按钮 */
        .auth-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(82, 196, 26, 0.35);
            transition: all 0.2s;
        }

        .auth-button:active {
            transform: scale(0.98);
        }

        /* 隐私说明 */
        .privacy-section {
            text-align: center;
            padding: 0 16px;
        }

        .privacy-text {
            font-size: 11px;
            color: #999;
            line-height: 1.6;
        }

        .privacy-link {
            color: #1890ff;
            text-decoration: none;
        }

        /* 底部安全提示 */
        .safety-hint {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #ccc;
        }

        /* 底部横条 */
        .home-indicator {
            width: 134px;
            height: 5px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Toast提示 */
        .toast {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="phone-notch"></div>
        <div class="screen">
            <!-- 状态栏 -->
            <div class="status-bar">
                <span>9:41</span>
                <span>中国移动</span>
                <span>📶 🔋</span>
            </div>

            <!-- 主内容 -->
            <div class="content">
                <!-- Logo区域 -->
                <div class="logo-section">
                    <div class="logo-circle">
                        <span class="logo-icon">🌱</span>
                    </div>
                    <h1 class="app-title">情绪关怀小站</h1>
                    <p class="app-subtitle">你的专属心理调适小助手</p>
                </div>

                <!-- 功能特点 -->
                <div class="features-section">
                    <div class="feature-card">
                        <div class="feature-icon blue">💬</div>
                        <div class="feature-content">
                            <div class="feature-title">随时记录情绪</div>
                            <div class="feature-desc">在这里，你可以随时记录和整理自己的情绪，无需任何压力。</div>
                        </div>
                    </div>

                    <div class="feature-card">
                        <div class="feature-icon pink">🔒</div>
                        <div class="feature-content">
                            <div class="feature-title">隐私全权掌控</div>
                            <div class="feature-desc">你的所有数据由你全权控制，随时可以解绑并清除记录。</div>
                        </div>
                    </div>

                    <div class="feature-card">
                        <div class="feature-icon green">🌿</div>
                        <div class="feature-content">
                            <div class="feature-title">真实无测评</div>
                            <div class="feature-desc">所见即所得，没有隐藏的长篇测评，只有温暖的陪伴。</div>
                        </div>
                    </div>
                </div>

                <!-- 授权绑定按钮 -->
                <button class="auth-button" onclick="handleAuth()">
                    <span>📱</span> 微博授权绑定
                </button>

                <!-- 隐私说明 -->
                <div class="privacy-section">
                    <p class="privacy-text">
                        授权仅用于获取公开社交内容，帮助我们更好地了解你的状态。
                        <br>
                        <a href="#" class="privacy-link">隐私政策</a> | 
                        <a href="#" class="privacy-link">服务条款</a>
                    </p>
                </div>

                <!-- 底部安全提示 -->
                <div class="safety-hint">
                    绑定后可随时在设置中解绑账号
                </div>
            </div>

            <!-- 底部横条 -->
            <div class="home-indicator"></div>

            <!-- Toast提示 -->
            <div class="toast" id="toast"></div>
        </div>
    </div>

    <script>
        function handleAuth() {
            showToast('正在跳转授权页面...');
            setTimeout(() => {
                showToast('授权成功！');
                setTimeout(() => {
                    alert('授权绑定成功！你可以正常使用情绪关怀小站了。');
                }, 1500);
            }, 1000);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
